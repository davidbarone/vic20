<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Vic20 Emulator</title>
  </head>
  <body>
    <h1>Vic20 Emulator</h1>

    <h2>Code</h2>

    <textarea></textarea>

    <canvas
      id="screen"
      width="600"
      height="400"
      style="border: 1px solid black"
    ></canvas>
    <h2>Registers</h2>

    <script>
      // Bootstrap code
      function ready(fn) {
        if (document.readyState != "loading") {
          fn();
        } else {
          document.addEventListener("DOMContentLoaded", fn);
        }
      }

      ready(() => {
        // Bootstrap the vic 20
        let canvas = document.getElementById("screen");
        let computer = new window.vic20(canvas);
        computer.init();
      });
    </script>
  </body>
</html>
